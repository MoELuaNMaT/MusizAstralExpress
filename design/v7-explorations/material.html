<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLMusic - Material Design 3 Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --m3-primary: #6750A4;
            --m3-on-primary: #FFFFFF;
            --m3-primary-container: #EADDFF;
            --m3-on-primary-container: #21005D;
            --m3-secondary: #625B71;
            --m3-surface: #FEF7FF;
            --m3-surface-variant: #E7E0EC;
            --m3-outline: #79747E;
        }

        body {
            background-color: var(--m3-surface);
            color: #1C1B1F;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .m3-card {
            background-color: var(--m3-surface-variant);
            border-radius: 24px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .m3-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .m3-btn-fab {
            background-color: var(--m3-primary-container);
            color: var(--m3-on-primary-container);
            border-radius: 16px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .m3-nav-pill {
            border-radius: 32px;
            transition: all 0.2s ease;
        }
        .m3-nav-pill.active {
            background-color: var(--m3-primary-container);
            color: var(--m3-on-primary-container);
            font-weight: 700;
        }

        .m3-input {
            background-color: var(--m3-surface-variant);
            border-bottom: 2px solid var(--m3-outline);
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
        }

        /* 模拟 Android 状态栏 */
        .android-status-bar {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-weight: 500;
            font-size: 14px;
        }
    </style>
</head>
<body class="flex items-center justify-center gap-10 p-10">

    <!-- PC Desktop Layout (Material Design 3) -->
    <div class="w-[1100px] h-[750px] bg-white rounded-[32px] flex overflow-hidden shadow-2xl border border-gray-100">
        <!-- Navigation Rail -->
        <aside class="w-20 flex flex-col items-center py-8 gap-8 border-r border-gray-100 bg-[#F3EDF7]">
            <button class="w-12 h-12 m3-btn-fab flex items-center justify-center text-2xl">➕</button>
            <nav class="flex flex-col gap-6">
                <div class="flex flex-col items-center gap-1 group cursor-pointer">
                    <div class="w-14 h-8 m3-nav-pill active flex items-center justify-center text-xl">🏠</div>
                    <span class="text-[11px] font-medium">主页</span>
                </div>
                <div class="flex flex-col items-center gap-1 group cursor-pointer">
                    <div class="w-14 h-8 m3-nav-pill flex items-center justify-center text-xl group-hover:bg-gray-200">🎵</div>
                    <span class="text-[11px] font-medium">歌单</span>
                </div>
                <div class="flex flex-col items-center gap-1 group cursor-pointer">
                    <div class="w-14 h-8 m3-nav-pill flex items-center justify-center text-xl group-hover:bg-gray-200">🔍</div>
                    <span class="text-[11px] font-medium">搜索</span>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col bg-[#FEF7FF]">
            <header class="h-20 flex items-center px-10 justify-between">
                <div class="relative w-96">
                    <input type="text" placeholder="搜索歌曲..." class="w-full h-12 m3-input pl-4 pr-10 outline-none focus:border-[#6750A4] transition-colors">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2">🔍</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border border-gray-100">
                        <img src="https://i.pravatar.cc/100" class="w-full h-full object-cover">
                    </div>
                </div>
            </header>

            <div class="flex-1 px-10 pb-32 overflow-y-auto no-scrollbar">
                <h2 class="text-3xl font-normal mb-6 text-gray-800 tracking-tight">为您推荐</h2>
                
                <div class="grid grid-cols-4 gap-6 mb-10">
                    <div class="m3-card p-4">
                        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&q=80&w=400" class="w-full aspect-square rounded-2xl mb-4 object-cover">
                        <p class="font-bold text-gray-700 truncate">每日 30 首</p>
                        <p class="text-sm text-gray-500 mt-1">根据你的口味生成</p>
                    </div>
                    <div class="m3-card p-4">
                        <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&q=80&w=400" class="w-full aspect-square rounded-2xl mb-4 object-cover">
                        <p class="font-bold text-gray-700 truncate">流行趋势</p>
                        <p class="text-sm text-gray-500 mt-1">当下最火单曲</p>
                    </div>
                    <div class="m3-card p-4">
                        <img src="https://images.unsplash.com/photo-1459749411177-042180ce673c?auto=format&fit=crop&q=80&w=400" class="w-full aspect-square rounded-2xl mb-4 object-cover">
                        <p class="font-bold text-gray-700 truncate">深度冥想</p>
                        <p class="text-sm text-gray-500 mt-1">静心纯音乐</p>
                    </div>
                    <div class="m3-card p-4">
                        <img src="https://images.unsplash.com/photo-1514525253361-bee8718a7439?auto=format&fit=crop&q=80&w=400" class="w-full aspect-square rounded-2xl mb-4 object-cover">
                        <p class="font-bold text-gray-700 truncate">华语经典</p>
                        <p class="text-sm text-gray-500 mt-1">重温旧梦</p>
                    </div>
                </div>

                <h2 class="text-xl font-medium mb-4">歌曲列表</h2>
                <div class="bg-white rounded-3xl p-2 border border-gray-100">
                    <div class="flex items-center px-4 py-3 hover:bg-gray-50 rounded-2xl cursor-pointer group">
                        <span class="w-8 text-sm text-gray-400">1</span>
                        <div class="flex-1 flex items-center gap-4">
                            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=100" class="w-12 h-12 rounded-lg object-cover">
                            <div>
                                <p class="font-bold text-gray-700">七里香</p>
                                <p class="text-xs text-gray-500">周杰伦</p>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400">04:59</span>
                        <button class="ml-8 text-2xl text-gray-300 group-hover:text-rose-500 transition-colors">♡</button>
                    </div>
                    <div class="flex items-center px-4 py-3 bg-[#EADDFF] rounded-2xl cursor-pointer">
                        <span class="w-8 text-sm text-[#21005D] font-bold">▶</span>
                        <div class="flex-1 flex items-center gap-4">
                            <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&q=80&w=100" class="w-12 h-12 rounded-lg object-cover">
                            <div>
                                <p class="font-bold text-[#21005D]">晴天</p>
                                <p class="text-xs text-[#21005D]/70">周杰伦</p>
                            </div>
                        </div>
                        <span class="text-xs text-[#21005D]">04:29</span>
                        <button class="ml-8 text-2xl text-rose-500">♥</button>
                    </div>
                </div>
            </div>

            <!-- Playback Bar -->
            <footer class="h-24 bg-[#F7F2FA] border-t border-gray-200 flex items-center px-10 justify-between fixed bottom-10 left-[110px] right-[50px] rounded-3xl m-2 shadow-lg z-50">
                <div class="flex items-center gap-4 w-64">
                    <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&q=80&w=100" class="w-14 h-14 rounded-xl shadow-sm">
                    <div class="min-w-0">
                        <p class="font-bold text-sm truncate">晴天</p>
                        <p class="text-xs text-gray-500 truncate">周杰伦</p>
                    </div>
                </div>
                
                <div class="flex-1 flex flex-col items-center gap-2">
                    <div class="flex items-center gap-8">
                        <button class="text-2xl">⏮</button>
                        <button class="w-12 h-12 rounded-full bg-[#6750A4] text-white flex items-center justify-center text-xl">⏸</button>
                        <button class="text-2xl">⏭</button>
                    </div>
                    <div class="w-full max-w-md h-1 bg-gray-200 rounded-full relative">
                        <div class="w-1/3 h-full bg-[#6750A4] rounded-full"></div>
                        <div class="absolute top-1/2 left-1/3 -translate-y-1/2 w-3 h-3 rounded-full bg-[#6750A4]"></div>
                    </div>
                </div>

                <div class="w-64 flex justify-end gap-6 text-gray-500">
                    <button>🔊</button>
                    <button>📄</button>
                    <button>☰</button>
                </div>
            </footer>
        </main>
    </div>

    <!-- Mobile Layout (Material Design 3) -->
    <div class="w-[375px] h-[780px] bg-[#FEF7FF] rounded-[48px] border-[8px] border-gray-900 overflow-hidden flex flex-col shadow-2xl relative">
        <div class="android-status-bar">
            <span>9:41</span>
            <div class="ml-auto flex gap-2">
                <span>📶</span><span>🔋</span>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-6 pb-24 no-scrollbar">
            <h1 class="text-2xl font-normal mt-4 mb-6">上午好</h1>
            
            <!-- Quick Picks -->
            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="m3-card flex items-center gap-3 p-0 overflow-hidden pr-2">
                    <img src="https://images.unsplash.com/photo-1514525253361-bee8718a7439?auto=format&fit=crop&q=80&w=100" class="w-14 h-14 object-cover">
                    <span class="text-xs font-bold leading-tight truncate">我喜欢</span>
                </div>
                <div class="m3-card flex items-center gap-3 p-0 overflow-hidden pr-2">
                    <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&q=80&w=100" class="w-14 h-14 object-cover">
                    <span class="text-xs font-bold leading-tight truncate">周杰伦精选</span>
                </div>
            </div>

            <h2 class="text-lg font-medium mb-4">为您定制</h2>
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-4">
                <div class="w-40 shrink-0">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=200" class="w-40 h-40 rounded-[28px] object-cover mb-2 shadow-sm">
                    <p class="text-sm font-medium">私人雷达</p>
                </div>
                <div class="w-40 shrink-0">
                    <img src="https://images.unsplash.com/photo-1459749411177-042180ce673c?auto=format&fit=crop&q=80&w=200" class="w-40 h-40 rounded-[28px] object-cover mb-2 shadow-sm">
                    <p class="text-sm font-medium">专注时刻</p>
                </div>
            </div>

            <h2 class="text-lg font-medium mt-6 mb-4">最近播放</h2>
            <div class="space-y-4">
                <div class="flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&q=80&w=100" class="w-14 h-14 rounded-2xl object-cover">
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-sm">晴天</p>
                        <p class="text-xs text-gray-500">周杰伦</p>
                    </div>
                    <button class="text-gray-400">⋮</button>
                </div>
                <div class="flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&q=80&w=100" class="w-14 h-14 rounded-2xl object-cover">
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-sm">稻香</p>
                        <p class="text-xs text-gray-500">周杰伦</p>
                    </div>
                    <button class="text-gray-400">⋮</button>
                </div>
            </div>
        </div>

        <!-- Mobile Nav Bar -->
        <div class="h-20 bg-[#F3EDF7] flex items-center justify-around px-4 border-t border-gray-100">
            <div class="flex flex-col items-center gap-1">
                <div class="w-16 h-8 m3-nav-pill active flex items-center justify-center text-xl">🏠</div>
                <span class="text-[10px] font-bold">首页</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <div class="w-16 h-8 m3-nav-pill flex items-center justify-center text-xl">🎵</div>
                <span class="text-[10px] font-medium">歌单</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <div class="w-16 h-8 m3-nav-pill flex items-center justify-center text-xl">🔍</div>
                <span class="text-[10px] font-medium">搜索</span>
            </div>
        </div>

        <!-- Mini Player FAB-like -->
        <div class="absolute bottom-24 left-4 right-4 h-16 bg-[#EADDFF] rounded-2xl shadow-lg flex items-center px-4 gap-3">
            <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&q=80&w=100" class="w-12 h-12 rounded-lg object-cover">
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold truncate">晴天</p>
                <p class="text-[10px] text-gray-600 truncate">周杰伦</p>
            </div>
            <button class="text-xl">⏸</button>
            <button class="text-xl">⏭</button>
        </div>
    </div>

</body>
</html>
