<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLMusic - Claymorphism Full Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --clay-bg: #f0f3ff;
            --clay-primary: #6366f1;
            --clay-secondary: #ec4899;
            --clay-card: #f8faff;
            --clay-shadow-outer: 16px 16px 32px #d1d9e6, -16px -16px 32px #ffffff;
            --clay-shadow-inner: inset 4px 4px 8px rgba(255,255,255,0.6), inset -4px -4px 8px rgba(0,0,0,0.05);
        }

        body {
            background-color: var(--clay-bg);
            color: #475569;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 核心黏土卡片 */
        .clay-panel {
            background: var(--clay-card);
            border-radius: 40px;
            box-shadow: var(--clay-shadow-outer);
            border: 2px solid rgba(255,255,255,0.8);
            position: relative;
        }

        /* 凹陷效果（用于输入框、轨道条） */
        .clay-inset {
            background: var(--clay-bg);
            border-radius: 20px;
            box-shadow: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff;
            border: none;
        }

        /* 浮起按钮 */
        .clay-btn {
            background: var(--clay-card);
            border-radius: 20px;
            box-shadow: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff, var(--clay-shadow-inner);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }
        .clay-btn:active {
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            transform: scale(0.96);
        }
        .clay-btn-primary {
            background: var(--clay-primary);
            color: white;
            box-shadow: 6px 6px 12px rgba(99, 102, 241, 0.3), -6px -6px 12px #ffffff;
        }

        /* 歌曲行悬停 */
        .song-row {
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .song-row:hover {
            background: white;
            box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            transform: translateY(-2px);
        }
        .song-row.active {
            background: white;
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        /* 进度条 */
        .clay-progress-track {
            height: 12px;
            background: #e2e8f0;
            border-radius: 10px;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .clay-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        /* 滚动条 */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .clay-active-indicator {
            animation: pulse-soft 2s infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center p-8 gap-8">

    <!-- DESKTOP PC LAYOUT -->
    <div class="w-[1200px] h-[800px] clay-panel flex overflow-hidden relative">
        
        <!-- SIDEBAR -->
        <aside class="w-72 flex flex-col p-8 gap-8 bg-white/40 backdrop-blur-md border-r-2 border-white/50">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 clay-btn-primary rounded-2xl text-2xl font-black">A</div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">ALLMusic</h1>
            </div>

            <nav class="flex-1 flex flex-col gap-4">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-4">Menu</div>
                <button class="w-full h-14 clay-btn-primary text-sm gap-3">🏠 发现音乐</button>
                <button class="w-full h-14 clay-btn text-sm gap-3">🎵 聚合歌单</button>
                <button class="w-full h-14 clay-btn text-sm gap-3">❤️ 我喜欢</button>
                <button class="w-full h-14 clay-btn text-sm gap-3">🕒 最近播放</button>

                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-4 mt-8">Accounts</div>
                <div class="clay-inset p-4 space-y-3">
                    <div class="flex items-center justify-between text-xs">
                        <span class="font-bold flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-red-500"></span> 网易云</span>
                        <span class="text-slate-400">已登录</span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <span class="font-bold flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500"></span> QQ音乐</span>
                        <span class="text-slate-400">已登录</span>
                    </div>
                </div>
            </nav>

            <!-- User -->
            <div class="clay-btn h-20 p-4 gap-3 cursor-pointer">
                <img src="https://i.pravatar.cc/100?img=12" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-black truncate">Binaryify</p>
                    <p class="text-[10px] text-slate-400 font-bold">VIP 会员</p>
                </div>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="flex-1 flex flex-col min-w-0">
            <!-- Header -->
            <header class="h-24 flex items-center px-10 gap-6">
                <div class="flex-1 relative group">
                    <input type="text" class="w-full h-14 clay-inset pl-12 pr-6 text-sm font-bold outline-none focus:ring-2 ring-indigo-300 transition-all placeholder:text-slate-400" placeholder="搜索全球音乐资源...">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl">🔍</span>
                </div>
                <div class="flex gap-4">
                    <button class="w-14 h-14 clay-btn text-xl">🔔</button>
                    <button class="w-14 h-14 clay-btn text-xl">✨</button>
                </div>
            </header>

            <div class="flex-1 flex gap-8 px-10 pb-32 overflow-hidden">
                <!-- Content Scroll -->
                <div class="flex-1 flex flex-col gap-8 overflow-y-auto no-scrollbar custom-scroll pr-4">
                    
                    <!-- Banner -->
                    <section class="h-56 clay-panel bg-gradient-to-br from-indigo-500 to-purple-600 p-10 flex items-center justify-between text-white relative overflow-hidden shrink-0">
                        <div class="relative z-10">
                            <h2 class="text-4xl font-black mb-2">每日推荐</h2>
                            <p class="text-indigo-100 font-bold mb-6 opacity-80">根据你的双平台听歌习惯聚合生成</p>
                            <button class="h-12 px-8 clay-btn bg-white text-indigo-600 font-black">立即播放全部</button>
                        </div>
                        <div class="relative z-10 w-40 h-40 clay-panel bg-white/20 backdrop-blur-lg flex items-center justify-center text-6xl shadow-none border-none">💿</div>
                        <!-- Decorative shapes -->
                        <div class="absolute -top-10 -right-10 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
                    </section>

                    <!-- Song List -->
                    <section>
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-xl font-black text-slate-800">热门搜索结果</h3>
                            <div class="flex gap-2">
                                <span class="px-3 py-1 clay-inset text-[10px] font-black text-indigo-500">网易云</span>
                                <span class="px-3 py-1 clay-inset text-[10px] font-black text-green-500">QQ音乐</span>
                            </div>
                        </div>

                        <div class="space-y-3 pb-10">
                            <!-- Song Items -->
                            <div class="song-row p-4 flex items-center gap-4 cursor-pointer active">
                                <div class="w-8 text-sm font-black text-slate-300">01</div>
                                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=100" class="w-12 h-12 rounded-2xl shadow-md border-2 border-white">
                                <div class="flex-1 min-w-0">
                                    <p class="font-black text-sm text-indigo-600">晴天 (Sunny Day)</p>
                                    <p class="text-xs text-slate-400 font-bold">周杰伦 · 叶惠美</p>
                                </div>
                                <div class="flex items-center gap-6">
                                    <span class="w-2 h-2 rounded-full bg-red-400"></span>
                                    <span class="text-xs font-bold text-slate-400 font-mono">04:29</span>
                                    <button class="text-2xl text-rose-400">♥</button>
                                </div>
                            </div>

                            <div class="song-row p-4 flex items-center gap-4 cursor-pointer">
                                <div class="w-8 text-sm font-black text-slate-300">02</div>
                                <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&q=80&w=100" class="w-12 h-12 rounded-2xl shadow-md border-2 border-white">
                                <div class="flex-1 min-w-0">
                                    <p class="font-black text-sm text-slate-700">稻香</p>
                                    <p class="text-xs text-slate-400 font-bold">周杰伦 · 魔杰座</p>
                                </div>
                                <div class="flex items-center gap-6">
                                    <span class="w-2 h-2 rounded-full bg-green-400"></span>
                                    <span class="text-xs font-bold text-slate-400 font-mono">03:43</span>
                                    <button class="text-2xl text-slate-300 hover:text-rose-400 transition-colors">♡</button>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Right Detail Panel -->
                <aside class="w-80 flex flex-col gap-6">
                    <div class="clay-panel flex-1 p-6 flex flex-col">
                        <div class="text-center mb-6">
                            <h4 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Now Playing</h4>
                            <div class="relative inline-block">
                                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=300" class="w-48 h-48 rounded-[40px] shadow-2xl border-4 border-white mb-6">
                                <div class="absolute -bottom-2 -right-2 w-12 h-12 clay-btn-primary rounded-full text-xl flex items-center justify-center">▶</div>
                            </div>
                            <h3 class="text-xl font-black text-slate-800">晴天</h3>
                            <p class="text-sm text-slate-500 font-bold mt-1">周杰伦</p>
                        </div>

                        <!-- Lyrics Preview -->
                        <div class="flex-1 clay-inset p-4 overflow-hidden relative">
                            <div class="text-center space-y-4 pt-4">
                                <p class="text-xs text-slate-400 font-bold">故事的小黄花</p>
                                <p class="text-sm text-indigo-600 font-black">从出生那年就飘着</p>
                                <p class="text-xs text-slate-400 font-bold">童年的荡秋千</p>
                                <p class="text-xs text-slate-400 font-bold">随记忆一直晃到现在</p>
                            </div>
                            <!-- Blur Overlay -->
                            <div class="absolute bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-[#f0f3ff] to-transparent"></div>
                        </div>
                    </div>
                </aside>
            </div>

            <!-- Player Bar Fixed -->
            <footer class="absolute bottom-6 left-10 right-10 h-28 clay-panel bg-white/80 backdrop-blur-xl px-10 flex items-center justify-between z-50">
                <!-- Song Info -->
                <div class="flex items-center gap-4 w-72">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=100" class="w-16 h-16 rounded-2xl shadow-lg border-2 border-white">
                    <div class="min-w-0">
                        <p class="font-black text-sm truncate text-indigo-600">晴天</p>
                        <p class="text-xs text-slate-400 font-bold truncate mt-1">周杰伦</p>
                    </div>
                    <button class="ml-2 text-2xl text-rose-500">♥</button>
                </div>

                <!-- Controls -->
                <div class="flex-1 max-w-2xl flex flex-col items-center gap-3">
                    <div class="flex items-center gap-10">
                        <button class="text-2xl text-slate-300 hover:text-indigo-500 transition-colors">⏮</button>
                        <button class="w-16 h-16 clay-btn-primary rounded-full text-2xl shadow-xl clay-active-indicator pl-1">▶</button>
                        <button class="text-2xl text-slate-300 hover:text-indigo-500 transition-colors">⏭</button>
                    </div>
                    <div class="w-full flex items-center gap-4 px-10">
                        <span class="text-[10px] font-black text-slate-400 w-10 text-right">01:36</span>
                        <div class="flex-1 clay-progress-track">
                            <div class="clay-progress-fill w-1/3"></div>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 w-10">04:29</span>
                    </div>
                </div>

                <!-- Extras -->
                <div class="w-72 flex justify-end items-center gap-6">
                    <div class="flex items-center gap-2 w-32">
                        <span class="text-sm">🔊</span>
                        <div class="flex-1 clay-inset h-2 relative overflow-hidden">
                            <div class="absolute inset-y-0 left-0 w-2/3 bg-slate-400 rounded-full"></div>
                        </div>
                    </div>
                    <button class="w-12 h-12 clay-btn text-xs font-black">HQ</button>
                    <button class="w-12 h-12 clay-btn text-xl">☰</button>
                </div>
            </footer>
        </main>
    </div>

    <!-- MOBILE LAYOUT -->
    <div class="w-[400px] h-[820px] clay-panel flex flex-col overflow-hidden relative border-[12px] border-white shadow-2xl scale-95 origin-left">
        <!-- Status Bar -->
        <div class="h-10 flex justify-between items-center px-8 text-xs font-black text-slate-400">
            <span>9:41</span>
            <div class="flex gap-2"><span>📶</span><span>🔋</span></div>
        </div>

        <!-- Mobile Header -->
        <header class="px-8 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black text-indigo-500">ALLMusic</h1>
            <div class="w-12 h-12 clay-btn text-xl">👤</div>
        </header>

        <!-- Mobile Content -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-8 pb-32 pt-4">
            <!-- Search -->
            <div class="h-14 clay-inset mb-8 flex items-center px-4 gap-3">
                <span class="text-lg">🔍</span>
                <input type="text" class="bg-transparent outline-none flex-1 text-sm font-bold" placeholder="Search...">
            </div>

            <!-- Card Big -->
            <div class="w-full aspect-square clay-panel p-6 bg-gradient-to-tr from-pink-50 to-indigo-50 flex flex-col items-center justify-center mb-10">
                <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&q=80&w=400" class="w-full aspect-square rounded-[40px] shadow-2xl border-4 border-white object-cover">
                <div class="mt-8 text-center">
                    <h2 class="text-2xl font-black text-slate-800">稻香</h2>
                    <p class="font-bold text-slate-400 mt-1">周杰伦</p>
                </div>
            </div>

            <!-- Player Controls Mobile -->
            <div class="space-y-8">
                <div class="clay-progress-track">
                    <div class="clay-progress-fill w-1/2"></div>
                </div>
                <div class="flex items-center justify-center gap-10">
                    <button class="w-16 h-16 clay-btn text-2xl">⏮</button>
                    <button class="w-24 h-24 clay-btn-primary rounded-full text-4xl shadow-xl pl-2">▶</button>
                    <button class="w-16 h-16 clay-btn text-2xl">⏭</button>
                </div>
            </div>
        </div>

        <!-- Mobile Nav -->
        <div class="absolute bottom-6 left-6 right-6 h-20 clay-panel bg-white/90 backdrop-blur-md flex items-center justify-around px-2">
            <button class="flex flex-col items-center gap-1 text-indigo-500">
                <span class="text-2xl">🏠</span>
                <span class="text-[9px] font-black uppercase">Home</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-400">
                <span class="text-2xl">🔍</span>
                <span class="text-[9px] font-black uppercase">Search</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-400">
                <span class="text-2xl">❤️</span>
                <span class="text-[9px] font-black uppercase">Loved</span>
            </button>
        </div>
    </div>

</body>
</html>
