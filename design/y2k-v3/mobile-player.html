<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALLMusic Y2K V3 - 移动播放页</title>
  <link rel="stylesheet" href="./theme.css" />
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="i-play" viewBox="0 0 24 24"><path d="M8 6v12l10-6z"/></symbol>
      <symbol id="i-prev" viewBox="0 0 24 24"><path d="M7 6v12"/><path d="m18 6-8 6 8 6z"/></symbol>
      <symbol id="i-next" viewBox="0 0 24 24"><path d="M17 6v12"/><path d="m6 6 8 6-8 6z"/></symbol>
      <symbol id="i-heart" viewBox="0 0 24 24"><path d="M12 20s-7-4.3-7-10a4 4 0 0 1 7-2.3A4 4 0 0 1 19 10c0 5.7-7 10-7 10z"/></symbol>
      <symbol id="i-lyric" viewBox="0 0 24 24"><path d="M5 6h14"/><path d="M5 11h10"/><path d="M5 16h14"/></symbol>
      <symbol id="i-disc" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2"/></symbol>
      <symbol id="i-wave" viewBox="0 0 24 24"><path d="M3 13c1.5 0 1.5-2 3-2s1.5 2 3 2 1.5-2 3-2 1.5 2 3 2 1.5-2 3-2 1.5 2 3 2"/></symbol>
      <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 10.8 12 4l9 6.8"/><path d="M6.5 9.8V20h11V9.8"/></symbol>
    </defs>
  </svg>

  <div class="scene">
    <div class="headline">
      <a class="back-pill focusable" href="./mobile-player.html"><span class="ball"></span><span>Y2K V3 / Mobile Player</span></a>
      <div class="muted">页面：<a href="./mobile-login.html">登录页</a> · <a href="./mobile-home.html">主界面</a> · <a href="./desktop-player.html">桌面端</a></div>
    </div>

    <div class="phone-shells" style="grid-template-columns:minmax(280px,420px)">
      <article class="phone">
        <div class="phone-screen">
          <div class="notch90"></div>
          <div class="mobile-top"><span>9:41</span><span>5G · 88%</span></div>

          <section class="mobile-win">
            <div class="titlebar90" style="min-height:34px"><div class="title"><svg class="icon"><use href="#i-disc"/></svg><span>播放页面</span></div><div class="sys-btns"><span></span><span></span></div></div>
            <div class="mobile-body" style="display:grid;gap:9px">
              <div style="width:100%;aspect-ratio:1;border:2px solid var(--line);border-radius:14px;background:radial-gradient(circle at 26% 22%,rgba(255,255,255,.48),transparent 30%),linear-gradient(145deg,#63b8ff,#9b4dff 54%,#ff4cd2)"></div>
              <div><h2 style="margin:0;font-size:1.25rem">晴天</h2><p class="muted" style="margin:4px 0 0">周杰伦 · 叶惠美</p></div>
              <div class="progress90"><span style="width:44%"></span></div>
              <div style="display:flex;justify-content:space-between" class="muted"><span>01:52</span><span>04:29</span></div>
              <div class="menu90" style="justify-content:center">
                <button class="icon90"><svg class="icon"><use href="#i-prev"/></svg></button>
                <button class="btn90 hot"><svg class="icon"><use href="#i-play"/></svg></button>
                <button class="icon90"><svg class="icon"><use href="#i-next"/></svg></button>
                <button class="icon90"><svg class="icon"><use href="#i-heart"/></svg></button>
              </div>
              <div class="mobile-item"><span style="display:inline-flex;align-items:center;gap:8px"><svg class="icon"><use href="#i-lyric"/></svg>歌词面板</span><span class="muted">展开</span></div>
              <div class="mobile-item"><span style="display:inline-flex;align-items:center;gap:8px"><svg class="icon"><use href="#i-wave"/></svg>均衡器</span><span class="eq90" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></span></div>
            </div>
          </section>

          <nav class="tabbar90">
            <button><svg class="icon"><use href="#i-home"/></svg></button>
            <button><svg class="icon"><use href="#i-wave"/></svg></button>
            <button class="active"><svg class="icon"><use href="#i-play"/></svg></button>
            <button><svg class="icon"><use href="#i-heart"/></svg></button>
          </nav>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
