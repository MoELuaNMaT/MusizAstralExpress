<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALLMusic Y2K - 移动播放页</title>
  <link rel="stylesheet" href="./theme.css" />
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="i-play" viewBox="0 0 24 24"><path d="M8 6v12l10-6z"/></symbol>
      <symbol id="i-prev" viewBox="0 0 24 24"><path d="M7 6v12"/><path d="m18 6-8 6 8 6z"/></symbol>
      <symbol id="i-next" viewBox="0 0 24 24"><path d="M17 6v12"/><path d="m6 6 8 6-8 6z"/></symbol>
      <symbol id="i-heart" viewBox="0 0 24 24"><path d="M12 20s-7-4.3-7-10a4 4 0 0 1 7-2.3A4 4 0 0 1 19 10c0 5.7-7 10-7 10z"/></symbol>
      <symbol id="i-lyric" viewBox="0 0 24 24"><path d="M5 6h14"/><path d="M5 11h10"/><path d="M5 16h14"/></symbol>
      <symbol id="i-disc" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2"/></symbol>
      <symbol id="i-wave" viewBox="0 0 24 24"><path d="M3 13c1.5 0 1.5-2 3-2s1.5 2 3 2 1.5-2 3-2 1.5 2 3 2 1.5-2 3-2 1.5 2 3 2"/></symbol>
      <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 10.8 12 4l9 6.8"/><path d="M6.5 9.8V20h11V9.8"/></symbol>
    </defs>
  </svg>

  <div class="scene">
    <div class="scene-header">
      <a class="brand-link" href="./mobile-player.html"><span class="brand-dot"></span><span>ALLMusic Y2K / Mobile Player</span></a>
      <div class="scene-meta">相关页面：<a href="./mobile-login.html">登录页</a> · <a href="./mobile-home.html">主界面</a> · <a href="./desktop-player.html">桌面端</a></div>
    </div>

    <section class="mobile-grid" style="grid-template-columns:minmax(280px,420px)">
      <article class="phone">
        <div class="phone-screen">
          <div class="notch"></div>
          <div class="m-head"><span>9:41</span><span>5G · 88%</span></div>

          <div class="m-window">
            <div class="titlebar" style="height:36px"><div class="titlebar-left"><svg class="icon"><use href="#i-disc"/></svg><span>播放页</span></div></div>
            <div class="m-body" style="display:grid;gap:10px">
              <div style="width:100%;aspect-ratio:1;border-radius:14px;border:1px solid var(--line);background:radial-gradient(circle at 26% 24%,rgba(255,255,255,.45),transparent 35%),linear-gradient(140deg,#6ea6ff,#ad84ff,#ff7fe3)"></div>
              <div>
                <h2 style="margin:0;font-size:1.25rem">晴天</h2>
                <p style="margin:4px 0 0;color:var(--muted)">周杰伦 · 叶惠美</p>
              </div>
              <div class="progress"><span style="width:43%"></span></div>
              <div style="display:flex;justify-content:space-between;color:var(--muted);font-size:.82rem"><span>01:52</span><span>04:29</span></div>

              <div class="menu-strip" style="justify-content:center">
                <button class="icon-button"><svg class="icon"><use href="#i-prev"/></svg></button>
                <button class="bevel primary"><svg class="icon"><use href="#i-play"/></svg></button>
                <button class="icon-button"><svg class="icon"><use href="#i-next"/></svg></button>
                <button class="icon-button"><svg class="icon"><use href="#i-heart"/></svg></button>
              </div>

              <div class="m-item"><span style="display:inline-flex;align-items:center;gap:8px"><svg class="icon"><use href="#i-lyric"/></svg>歌词面板</span><span class="scene-meta">展开</span></div>
              <div class="m-item"><span style="display:inline-flex;align-items:center;gap:8px"><svg class="icon"><use href="#i-wave"/></svg>均衡器</span><span class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></span></div>
            </div>
          </div>

          <nav class="m-nav" aria-label="底部导航">
            <button><svg class="icon"><use href="#i-home"/></svg></button>
            <button><svg class="icon"><use href="#i-wave"/></svg></button>
            <button class="active"><svg class="icon"><use href="#i-play"/></svg></button>
            <button><svg class="icon"><use href="#i-heart"/></svg></button>
          </nav>
        </div>
      </article>
    </section>
  </div>
</body>
</html>
